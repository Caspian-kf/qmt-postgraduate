<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历年分数线 - 南京邮电大学材料考研信息采集与分析系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="score">
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="index.html">南邮材料考研</a>
      <button class="nav-toggle" type="button" aria-label="展开导航" data-nav-toggle>☰</button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">首页</a>
        <a href="data.html">信息列表</a>
        <a class="active" href="score.html">历年分数线</a>
        <a href="admission.html">录取统计</a>
        <a href="analysis.html">分析图表</a>
        <a href="https://github.com/Caspian-kf/qmt-postgraduate" target="_blank" rel="noopener">GitHub 仓库</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <section class="page-heading">
      <p class="eyebrow">Score Lines</p>
      <h1>历年复试分数线</h1>
      <p class="muted">展示结构化提取的材料相关专业复试分数线。</p>
    </section>

    <p class="notice">本页面数据由公开网页采集整理，可能存在滞后或解析误差，最终信息以南京邮电大学官方发布为准。</p>

    <section class="toolbar score-toolbar">
      <label>年份<select id="score-year-filter"><option value="">全部年份</option></select></label>
      <label>专业<select id="score-major-filter"><option value="">全部专业</option></select></label>
      <button id="score-sort" class="btn" type="button">按分数排序</button>
    </section>

    <section class="table-section">
      <div class="table-meta">
        <strong id="score-count">0 条分数线</strong>
        <span id="score-status" class="muted">正在读取数据...</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>年份</th>
              <th>学院</th>
              <th>专业代码</th>
              <th>专业名称</th>
              <th>学位类型</th>
              <th>学习方式</th>
              <th>复试分数线</th>
              <th>来源链接</th>
            </tr>
          </thead>
          <tbody id="score-table-body"></tbody>
        </table>
      </div>
      <p id="score-empty-message" class="empty-message hidden">暂无分数线数据。</p>
    </section>
  </main>

  <footer class="site-footer"><p>分数线以官方发布为准。</p></footer>
  <script src="js/main.js"></script>
</body>
</html>
