<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析图表 - 南京邮电大学材料考研信息采集与分析系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="analysis">
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="index.html">南邮材料考研</a>
      <button class="nav-toggle" type="button" aria-label="展开导航" data-nav-toggle>☰</button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">首页</a>
        <a href="data.html">信息列表</a>
        <a href="score.html">历年分数线</a>
        <a href="admission.html">录取统计</a>
        <a class="active" href="analysis.html">分析图表</a>
        <a href="https://github.com/Caspian-kf/qmt-postgraduate" target="_blank" rel="noopener">GitHub 仓库</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <section class="page-heading">
      <p class="eyebrow">Analysis</p>
      <h1>结构化数据分析图表</h1>
      <p id="analysis-status" class="muted">正在读取数据并生成图表...</p>
    </section>

    <p class="notice">本页面数据由公开网页采集整理，可能存在滞后或解析误差，最终信息以南京邮电大学官方发布为准。</p>

    <section class="chart-grid">
      <article class="chart-card wide"><h2>历年复试分数线趋势</h2><div id="score-trend-chart" class="chart"></div></article>
      <article class="chart-card"><h2>各专业复试线对比</h2><div id="score-major-chart" class="chart"></div></article>
      <article class="chart-card"><h2>历年录取人数</h2><div id="admission-count-chart" class="chart"></div></article>
      <article class="chart-card"><h2>信息类别数量分布</h2><div id="category-chart" class="chart"></div></article>
      <article class="chart-card"><h2>来源数量分布</h2><div id="source-chart" class="chart"></div></article>
    </section>
  </main>

  <footer class="site-footer"><p>图表由 ECharts 渲染，统计结果随数据文件更新。</p></footer>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
